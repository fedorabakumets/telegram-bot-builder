# Docker Compose конфигурация для конструктора Telegram-ботов
# Запускает приложение и PostgreSQL базу данных одной командой
# Usage: docker compose up -d

services:
  # База данных PostgreSQL для хранения проектов и настроек
  db:
    image: postgres:15-alpine
    container_name: bot-builder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bot-builder-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  # Основное приложение (конструктор ботов)
  app:
    build: .
    container_name: bot-builder-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      PGHOST: "${PGHOST}"
      PGPORT: "${PGPORT}"
      PGDATABASE: "${PGDATABASE}"
      PGUSER: "${PGUSER}"
      PGPASSWORD: "${PGPASSWORD}"
      PGSSLMODE: "${PGSSLMODE}"
      SESSION_SECRET: "${SESSION_SECRET}"
      NODE_ENV: "${NODE_ENV}"
      PORT: "${PORT}"
      HOST: "${HOST}"
      REDIS_URL: "${REDIS_URL}"
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./bots:/app/bots

volumes:
  postgres_data:
    name: bot-builder-postgres-data
  redis_data:
    name: bot-builder-redis-data
